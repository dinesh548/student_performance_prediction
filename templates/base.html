<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Student Performance Prediction{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/"><span>Student Prediction</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li  class="navbar-brand"><a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/"><span>Home</span></a></li>
        <li class="navbar-brand"><a class="nav-link {% if request.path=='/dashboard' %}active{% endif %}" href="/dashboard"><span>Dashboard</span></a></li>
        <li class="navbar-brand"><a class="nav-link {% if request.path=='/predict' %}active{% endif %}" href="/predict"><span>Predict</span></a></li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Footer -->
<footer>
  <p>Student Performance Prediction System &nbsp;·&nbsp; Built with Python, Flask &amp; scikit-learn</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
